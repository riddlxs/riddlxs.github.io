<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type='text/css' href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css" />
    <link rel="stylesheet" href="/css/app.css">
    <title>Riddlxs Portfolio 2026</title>
</head>

<body>
    <header>
        <img id="logo" src="/assets/images/logo.png" alt="logo">
    </header>
    <nav>
        <a href="#" title="home">HOME</a>
        <a href="#about" title="about">ABOUT</a>
        <a href="#skills" title="skills">SKILLS</a>
        <a href="#contact" title="contact">CONTACT</a>
    </nav>
    <main>
        <div id="about">
            <img id="bioPic" src="/assets/images/bioPic.png" alt="riddlxs">
            <p>Hello Im liana Hockin</p>
            <p>list cool stuff here about me.</p>
        </div>
        <div id="skills">
            <h1>My Skills</h1>
            <div class="skill">
                <div class="topSkill">
                    <h1>HTML</h1>
                </div>
                <div class="bottomSkill">
                    <i class="devicon-html5-plain colored"></i>
                </div>
            </div>
            <div class="skill">
                <div class="topSkill">
                    <h1>CSS</h1>
                </div>
                <div class="bottomSkill">
                    <i class="devicon-css3-plain colored"></i>
                </div>
            </div>
            <div class="skill">
                <div class="topSkill">
                    <h1>Javascript</h1>
                </div>
                <div class="bottomSkill">
                    <i class="devicon-javascript-plain colored"></i>
                </div>
            </div>
        </div>
        <div id="contact">
            <h1>Contact Me</h1>
            <form id="contactForm">
                <input type="text" name="name" placeholder="Enter Name" required>
                <input type="email" name="email" placeholder="Enter Email" required>
                <textarea name="message" rows="5" maxlength="500" placeholder="Type your message here!"
                    required></textarea>
                <button type="submit">Send Message</button>
            </form>
        </div>
    </main>
    <footer>
        &copy; 2026 Riddlxs. All rights reserved.
    </footer>
</body>

</html>
